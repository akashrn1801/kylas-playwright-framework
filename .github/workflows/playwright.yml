name: Playwright Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run tests
        env:
          ENV: qa
          QA_APP_URL: ${{ secrets.QA_APP_URL }}
          QA_API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_RESTRICTED_EMAIL: ${{ secrets.QA_RESTRICTED_EMAIL }}
          QA_RESTRICTED_PASSWORD: ${{ secrets.QA_RESTRICTED_PASSWORD }}
          DEFAULT_TIMEOUT: 30000
          NAVIGATION_TIMEOUT: 60000
          EXPECT_TIMEOUT: 10000
          HEADLESS: true
          WORKERS: 2
          RETRY_COUNT: 1
        run: npx playwright test --project=chromium --reporter=line

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright-report/
          retention-days: 7
