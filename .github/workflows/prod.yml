name: CI — prod (prod-safe tests)
on:
  push:
    branches: [prod]
  pull_request:
    branches: [prod]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running against Prod?'
        required: true
        default: 'Manual verification'
jobs:
  run-tests:
    name: playwright-ci
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run prod-safe tests
        env:
          ENV: prod
          CI: true
          NAVIGATION_TIMEOUT: 120000
          PROD_APP_URL: ${{ secrets.PROD_APP_URL }}
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          PROD_ADMIN_EMAIL: ${{ secrets.PROD_ADMIN_EMAIL }}
          PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
          PROD_RESTRICTED_EMAIL: ${{ secrets.PROD_RESTRICTED_EMAIL }}
          PROD_RESTRICTED_PASSWORD: ${{ secrets.PROD_RESTRICTED_PASSWORD }}
        run: npx playwright test --project=chromium --grep @prodSafe --workers=2 --timeout=180000
      - name: Send notification email
        if: always()
        env:
          ENV: prod
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_SMTP_HOST: smtp.gmail.com
          GMAIL_SMTP_PORT: '587'
          NOTIFY_ENABLED: 'true'
          REPORT_PATH: reports/playwright-report/results.json
        run: npm run notify || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-prod
          path: playwright-report/
          retention-days: 30
