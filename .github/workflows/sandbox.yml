name: CI — sandbox (selective tests)

on:
  push:
    branches: [sandbox]

jobs:
  detect-and-run:
    name: playwright-selective
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Detect changed tests
        id: detect
        env:
          BASE_BRANCH: dev
        run: |
          TARGET=$(bash .github/scripts/detect-tests.sh)
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Detected test target: $TARGET"

      - name: Run selective tests
        env:
          ENV: qa
          CI: true
          NAVIGATION_TIMEOUT: 120000
          QA_APP_URL: ${{ secrets.QA_APP_URL }}
          QA_API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_RESTRICTED_EMAIL: ${{ secrets.QA_RESTRICTED_EMAIL }}
          QA_RESTRICTED_PASSWORD: ${{ secrets.QA_RESTRICTED_PASSWORD }}
        run: |
          TARGET="${{ steps.detect.outputs.target }}"
          echo "Running: npx playwright test --project=chromium --workers=1 $TARGET"
          npx playwright test --project=chromium --workers=1 $TARGET

      - name: Send notification email
        if: always()
        env:
          ENV: qa
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_SMTP_HOST: smtp.gmail.com
          GMAIL_SMTP_PORT: '587'
          NOTIFY_ENABLED: 'true'
          REPORT_PATH: reports/playwright-report/results.json
        run: npm run notify || true

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-sandbox
          path: reports/playwright-report/
          retention-days: 7
