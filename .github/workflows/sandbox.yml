name: CI — sandbox (selective tests)

on:
  push:
    branches: [sandbox]

jobs:
  detect-and-run:
    name: playwright-selective
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Detect changed tests
        id: detect
        env:
          BASE_BRANCH: dev
        run: |
          TARGET=$(bash .github/scripts/detect-tests.sh)
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Detected test target: $TARGET"

      - name: Run selective tests
        env:
          ENV: qa
          CI: true
          NAVIGATION_TIMEOUT: 120000
          QA_APP_URL: ${{ secrets.QA_APP_URL }}
          QA_API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_RESTRICTED_EMAIL: ${{ secrets.QA_RESTRICTED_EMAIL }}
          QA_RESTRICTED_PASSWORD: ${{ secrets.QA_RESTRICTED_PASSWORD }}
        run: |
          TARGET="${{ steps.detect.outputs.target }}"
          # WHY: Dynamic workers — 2 for large suites (>50 tests), 1 for small
          TEST_COUNT=$(npx playwright test --project=chromium --list $TARGET 2>/dev/null | grep -c "chromium" || echo "0")
          echo "Test count: $TEST_COUNT"
          if [ "$TEST_COUNT" -gt 50 ]; then
            WORKERS=2
          else
            WORKERS=1
          fi
          # WHY: Track start time for elapsed time reporting
          START_TIME=$(date +%s)
          echo "⏱️  Started at: $(date '+%H:%M:%S')"
          echo "📋 Test count: $TEST_COUNT | Workers: $WORKERS"
          echo "Running: npx playwright test --project=chromium --workers=$WORKERS $TARGET"

          npx playwright test --project=chromium --workers=$WORKERS $TARGET
          EXIT_CODE=$?

          # WHY: Report actual elapsed time after tests complete
          END_TIME=$(date +%s)
          ELAPSED=$((END_TIME - START_TIME))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          echo ""
          echo "⏱️  Finished at: $(date '+%H:%M:%S')"
          echo "✅ Total time: ${MINUTES}m ${SECONDS}s"
          echo "📊 Tests: $TEST_COUNT | Workers: $WORKERS | Time: ${MINUTES}m ${SECONDS}s"
          exit $EXIT_CODE

      - name: Send notification email
        if: always()
        env:
          ENV: qa
          BRANCH_NAME: sandbox
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_SMTP_HOST: smtp.gmail.com
          GMAIL_SMTP_PORT: '587'
          NOTIFY_ENABLED: 'true'
          REPORT_PATH: reports/playwright-report/results.json
        run: npm run notify || true

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-sandbox
          path: reports/playwright-report/
          retention-days: 7
