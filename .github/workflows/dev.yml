name: CI — dev (smoke)

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  run-tests:
    name: playwright-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        env:
          ENV: qa
          CI: true
          QA_APP_URL: ${{ secrets.QA_APP_URL }}
          QA_API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_RESTRICTED_EMAIL: ${{ secrets.QA_RESTRICTED_EMAIL }}
          QA_RESTRICTED_PASSWORD: ${{ secrets.QA_RESTRICTED_PASSWORD }}
        run: npx playwright test --project=chromium --grep @smoke --workers=4 --timeout=90000

      - name: Send notification email
        if: always()
        env:
          ENV: qa
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_SMTP_HOST: smtp.gmail.com
          GMAIL_SMTP_PORT: '587'
          NOTIFY_ENABLED: 'true'
          REPORT_PATH: reports/playwright-report/results.json
        run: npm run notify || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-dev
          path: playwright-report/
          retention-days: 7
