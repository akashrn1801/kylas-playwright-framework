name: CI — main (full validation)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-tests:
    name: playwright-ci
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run full validation suite
        env:
          ENV: prod
          CI: true
          PROD_APP_URL: ${{ secrets.PROD_APP_URL }}
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          PROD_ADMIN_EMAIL: ${{ secrets.PROD_ADMIN_EMAIL }}
          PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
          PROD_RESTRICTED_EMAIL: ${{ secrets.PROD_RESTRICTED_EMAIL }}
          PROD_RESTRICTED_PASSWORD: ${{ secrets.PROD_RESTRICTED_PASSWORD }}
        run: npx playwright test --project=chromium --grep "@regression" --workers=2 --timeout=90000

      - name: Send notification email
        if: always()
        env:
          ENV: qa
          ZOHO_APP_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
          ZOHO_SMTP_USER: ${{ secrets.ZOHO_SMTP_USER }}
          ZOHO_SMTP_HOST: smtp.zoho.in
          ZOHO_SMTP_PORT: '465'
          NOTIFY_ENABLED: 'true'
          REPORT_PATH: reports/playwright-report/results.json
        run: npm run notify || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-main
          path: playwright-report/
          retention-days: 90
