name: CI — stage (full suite)

on:
  push:
    branches: [stage]
  workflow_dispatch:

jobs:
  run-tests:
    name: playwright-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run full suite
        env:
          ENV: staging
          CI: true
          NAVIGATION_TIMEOUT: 120000
          STAGING_APP_URL: ${{ secrets.STAGING_APP_URL }}
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          STAGING_ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
          STAGING_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
          STAGING_RESTRICTED_EMAIL: ${{ secrets.STAGING_RESTRICTED_EMAIL }}
          STAGING_RESTRICTED_PASSWORD: ${{ secrets.STAGING_RESTRICTED_PASSWORD }}
          QA_ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
          QA_RESTRICTED_EMAIL: ${{ secrets.STAGING_RESTRICTED_EMAIL }}
          QA_RESTRICTED_PASSWORD: ${{ secrets.STAGING_RESTRICTED_PASSWORD }}
        run: npx playwright test --project=chromium --workers=2 --timeout=90000

      - name: Send notification email
        if: always()
        env:
          ENV: staging
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_SMTP_HOST: smtp.gmail.com
          GMAIL_SMTP_PORT: '587'
          NOTIFY_ENABLED: 'true'
          REPORT_PATH: reports/playwright-report/results.json
        run: npm run notify || true
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-stage
          path: reports/playwright-report/
          retention-days: 14
