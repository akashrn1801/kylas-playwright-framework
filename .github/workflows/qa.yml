name: CI — qa (regression)

on:
  push:
    branches: [qa]
  pull_request:
    branches: [qa]

jobs:
  run-tests:
    name: playwright-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run regression tests
        env:
          ENV: qa
          CI: true
          QA_APP_URL: ${{ secrets.QA_APP_URL }}
          QA_API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_RESTRICTED_EMAIL: ${{ secrets.QA_RESTRICTED_EMAIL }}
          QA_RESTRICTED_PASSWORD: ${{ secrets.QA_RESTRICTED_PASSWORD }}
        run: npx playwright test --project=chromium --grep @regression --workers=2 --timeout=90000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-qa
          path: playwright-report/
          retention-days: 14
